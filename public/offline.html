<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - PawPrint AI</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #F9FAFB;
            color: #1F2937;
            text-align: center;
            padding: 20px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 12px;
            color: #0D7377;
        }
        p {
            font-size: 16px;
            line-height: 1.5;
            margin: 0 0 24px;
            color: #6B7280;
            max-width: 320px;
        }
        .button {
            background-color: #0D7377;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .button:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="icon">🐾</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your connection. PawPrint will sync your data once you're back online.</p>
    <a href="/" class="button">Try Again</a>
</body>
</html>
